[build]
builder = "nixpacks"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 15
startCommand = "/bin/sh -c 'chmod +x start-health.sh && ./start-health.sh'"

[env]
APP_ENV = "production"
APP_DEBUG = "false"
APP_URL = "https://${{RAILWAY_PUBLIC_DOMAIN}}"
DB_CONNECTION = "sqlite"
DB_DATABASE = "/tmp/database.sqlite"
SESSION_DRIVER = "file"
CACHE_STORE = "file"
TRUSTED_PROXIES = "*"

[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_sqlite", "php82Extensions.gd", "php82Extensions.xml", "php82Extensions.bcmath", "php82Extensions.zip", "composer", "nodejs_20"]
