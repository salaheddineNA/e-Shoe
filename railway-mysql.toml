[build]
builder = "nixpacks"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
startCommand = "chmod +x start.sh && ./start.sh"

[env]
APP_ENV = "production"
APP_DEBUG = "false"
APP_URL = "https://${{RAILWAY_PUBLIC_DOMAIN}}"
DB_CONNECTION = "mysql"
DB_HOST = "${{RAILWAY_PRIVATE_SERVICE_MYSQL_HOST}}"
DB_PORT = "${{RAILWAY_PRIVATE_SERVICE_MYSQL_PORT}}"
DB_DATABASE = "railway"
DB_USERNAME = "${{RAILWAY_PRIVATE_SERVICE_MYSQL_USER}}"
DB_PASSWORD = "${{RAILWAY_PRIVATE_SERVICE_MYSQL_PASSWORD}}"
SESSION_DRIVER = "database"
CACHE_STORE = "file"

# MySQL plugin configuration
[[services]]
name = "mysql"
source = "mysql"
[services.config]
MYSQL_USER = "railway"
MYSQL_DATABASE = "shoestore"
